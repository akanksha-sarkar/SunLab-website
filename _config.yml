name: SunLab at Cornell University
url: "https://lab.jenjsun.com"
baseurl: ""
pi_site: "https://jenjsun.com/"
pi_name: "Jennifer J. Sun"

exclude: [bibble, README.md, Makefile, screenshot.png]

# colorize code snippets with the pygments module
highlighter: pygments

# The path structure for blog posts.
permalink: /blog/:year/:month/:day/:title.html

# Sections on the "people" page.
roles:
  - key: faculty
    name: Faculty
  - key: Phd
    name: PhD Students
  - key: MS
    name: MS Students
  - key: UG
    name: Undergraduate Students
  - key: alum
    name: Alumni

# Number of news stories on the front page.
front_page_news: 8

# Base pathname for links.
base: ''

# make pages for the _projects folder
collections:
  projects:
    output: true

# Navigation bar links.
navigation:
  - title: Home
    link: /
  - title: People
    link: /#people
  - title: Publications
    link: /publications.html
  - title: Photo Gallery
    link: /gallery.html

exclude:
  - vendor
  - vendor/bundle
  - Gemfile
  - Gemfile.lock
  - node_modules
  - .bundle
  - .github
  - .venv
  - requirements.txt
  - scripts